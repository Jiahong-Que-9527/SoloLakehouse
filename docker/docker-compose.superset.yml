# Apache Superset 6.0.0 for the default v2.5 stack.

services:
  superset:
    container_name: slh-superset
    build: ./superset
    depends_on:
      postgres:
        condition: service_healthy
      trino:
        condition: service_healthy
    environment:
      PRODUCT_ID: ${PRODUCT_ID:-sololakehouse}
      PRODUCT_DISPLAY_NAME: ${PRODUCT_DISPLAY_NAME:-SoloLakehouse}
      PRODUCT_DOMAIN: ${PRODUCT_DOMAIN:-financial_markets}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      RUNTIME_VERSION: ${RUNTIME_VERSION:-slh-v2.5.1}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SUPERSET_DB_NAME: ${SUPERSET_DB_NAME:-superset_metadata}
      SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME:-admin}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL:-admin@sololakehouse.local}
      SUPERSET_ADMIN_FIRSTNAME: ${SUPERSET_ADMIN_FIRSTNAME:-Solo}
      SUPERSET_ADMIN_LASTNAME: ${SUPERSET_ADMIN_LASTNAME:-Lakehouse}
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-sololakehouse-superset-secret-key-change-me}
      TRINO_USER: ${TRINO_USER:-sololakehouse}
      SUPERSET_TRINO_ICEBERG_DB_NAME: ${SUPERSET_TRINO_ICEBERG_DB_NAME:-trino_iceberg_gold}
      SUPERSET_TRINO_ICEBERG_URI: ${SUPERSET_TRINO_ICEBERG_URI:-}
      SUPERSET_TRINO_HIVE_DB_NAME: ${SUPERSET_TRINO_HIVE_DB_NAME:-trino_hive_default}
      SUPERSET_TRINO_HIVE_URI: ${SUPERSET_TRINO_HIVE_URI:-}
    ports:
      - "8088:8088"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 120s
